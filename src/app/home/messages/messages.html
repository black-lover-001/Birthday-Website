<div class="messages-section">

  <div class="messages-header text-center">
    <h3>
      <i class="bi bi-chat-dots theme-icon me-2"></i>
      Special Messages
    </h3>
    <p class="subtitle">
      Heartfelt words from loved ones 💌
    </p>
  </div>

<div class="row g-4 messages-row">

  <div class="col-md-6" *ngFor="let msg of visibleMessages; let i = index">
    <div class="message-card">
      <div class="card-body">

        <div class="message-top">
          <div class="author">
            <i class="bi bi-heart-fill"></i>
            <span>Memory {{ currentIndex + i + 1 }}</span>
          </div>
        </div>

        <div class="quote-mark">“</div>

        <p class="message-text">
          {{ msg }}
        </p>

      </div>
    </div>
  </div>

</div>

<!-- Navigation Buttons -->
<div class="text-center mt-4">

  <button
    class="btn btn-outline-secondary me-2"
    (click)="prev()"
    [disabled]="currentIndex === 0"
  >
    ⬅ Previous
  </button>

  <button
    class="btn btn-gradient"
    (click)="next()"
    [disabled]="currentIndex + pageSize >= allMessages.length"
  >
    Next ❤️
  </button>

</div>

</div>
