<div class="messages-section">

  <div class="messages-header text-center">
    <h3>
      <i class="bi bi-chat-dots theme-icon me-2"></i>
      Special Messages
    </h3>
    <p class="subtitle">
      Heartfelt words from loved ones 💌
    </p>
  </div>

  <div class="row g-4 messages-row">

    <div class="col-md-6" *ngFor="let msg of [1,2,3,4]">
      <div class="message-card">
        <div class="card-body">

          <div class="message-top">
            <div class="author">
              <i class="bi bi-person-circle"></i>
              <span>Friend {{msg}}</span>
            </div>
          </div>

          <div class="quote-mark">“</div>

          <p class="message-text">
            Wishing you a year full of happiness, growth, and unforgettable memories!
          </p>

        </div>
      </div>
    </div>

  </div>

</div>
