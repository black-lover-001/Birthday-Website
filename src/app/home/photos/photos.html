<div class="gallery-section">

  <div class="gallery-header text-center">
    <h3>
      <i class="bi bi-images theme-icon me-2"></i>
      Photo Gallery
    </h3>
    <p class="subtitle">Beautiful memories captured 📸</p>
  </div>

  <div class="row g-4 gallery-row">

    <div class="col-md-4 col-sm-6" *ngFor="let photo of [1,2,3,4,5,6]">
      <div class="photo-card">
        <img
          src="https://picsum.photos/600/400?random={{photo}}"
          alt="Birthday Photo"
        />
      </div>
    </div>

  </div>

</div>
