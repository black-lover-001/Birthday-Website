<div class="love-game" [class.shake]="shake">

  <div class="game-header">
    <h3>Find Me ❤️</h3>
    <p>I’m hiding… will you still choose me? 😏</p>
  </div>

  <!-- GAME AREA -->
  <div class="game-area">

    <div
      class="heart"
      *ngFor="let h of hearts; let i = index"
      (click)="clickHeart(i)"
      [ngStyle]="{
        top: positions[i]?.top + '%',
        left: positions[i]?.left + '%'
      }"
    >
      {{ brokenIndexes.includes(i) ? '💔' : '❤️' }}
    </div>

  </div>

  <!-- MESSAGE -->
  <p class="game-message">{{ message }}</p>

  <!-- SCORE -->
  <p class="score">Score: {{ score }}/{{ targetScore }}</p>

  <!-- FINAL REWARD -->
  <div *ngIf="gameWon" class="love-final">
    <h2>💖 You Chose Me 💖</h2>
    <p>I was never hiding… I just wanted you to choose me every time ❤️</p>
    <button (click)="restart()">Play Again</button>
  </div>

</div>
