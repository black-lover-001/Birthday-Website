<div class="wishes-section">

  <!-- Section Header -->
  <div class="section-header text-center">
    <h3>
      <i class="bi bi-stars theme-icon me-2"></i>
      Birthday Wishes
    </h3>
    <p class="subtitle">
      Celebrating another beautiful year 🎉
    </p>
  </div>

  <!-- Cards -->
  <div class="row g-4 wishes-row">

<div class="col-md-4" *ngFor="let wish of wishes">
  <div class="wish-card h-100">
    <div class="card-body text-center">

      <i class="bi theme-icon" [ngClass]="wish.icon"></i>

      <p>{{ wish.text }}</p>

    </div>
  </div>
</div>

</div>

</div>
